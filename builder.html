<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>LÖVA | Builder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

  <!-- NAV -->
  <nav class="flex justify-between p-4 bg-zinc-900">
    <h1 class="text-xl font-bold">LÖVA Builder</h1>
    <button onclick="goHome()">Volver</button>
  </nav>

  <!-- PROGRESS -->
  <div class="w-full bg-zinc-800 h-2">
    <div id="progress" class="bg-white h-2 w-1/4"></div>
  </div>

  <div class="flex flex-col md:flex-row h-[calc(100vh-80px)]">

    <!-- OPCIONES -->
    <div class="md:w-1/3 p-6 bg-zinc-900 overflow-y-auto">

      <!-- PASO 1 -->
      <div id="step1">
        <h2 class="text-2xl mb-4">Elige tu prenda</h2>

        <div class="grid grid-cols-2 gap-4">
          <button onclick="selectProduct('polera')" class="bg-zinc-800 p-4 rounded">Polera</button>
          <button onclick="selectProduct('polo')" class="bg-zinc-800 p-4 rounded">Polo</button>
          <button onclick="selectProduct('canguro')" class="bg-zinc-800 p-4 rounded">Canguro</button>
          <button onclick="selectProduct('sudadera')" class="bg-zinc-800 p-4 rounded">Sudadera</button>
        </div>
      </div>

      <!-- 🔥 CORTE SOLO PARA POLERA -->
      <div id="step1b" class="hidden">
        <h2 class="text-2xl mb-4">Tipo de corte</h2>

        <div class="flex gap-4">
          <button onclick="selectFit('oversized')" class="bg-zinc-800 px-4 py-2 rounded">Oversized</button>
          <button onclick="selectFit('basic')" class="bg-zinc-800 px-4 py-2 rounded">Básico</button>
        </div>
      </div>

      <!-- PASO 2 -->
      <div id="step2" class="hidden">
        <h2 class="text-2xl mb-4">Color</h2>

        <div class="flex gap-4">
          <button onclick="selectColor('#ffffff')" class="w-10 h-10 bg-white rounded-full"></button>
          <button onclick="selectColor('#000000')" class="w-10 h-10 bg-black border rounded-full"></button>
          <button onclick="selectColor('#ef4444')" class="w-10 h-10 bg-red-500 rounded-full"></button>
        </div>
      </div>

      <!-- PASO 3 -->
      <div id="step3" class="hidden">
        <h2 class="text-2xl mb-4">Diseño</h2>

        <input type="file" id="upload" multiple class="mb-4">

        <button onclick="deleteSelected()" class="bg-red-500 px-3 py-2 rounded mb-4">
          Eliminar seleccionado
        </button>

        <button onclick="nextStep()" class="bg-white text-black px-4 py-2 rounded">
          Siguiente
        </button>
      </div>

      <!-- PASO 4 -->
      <div id="step4" class="hidden">
        <h2 class="text-2xl mb-4">Talla</h2>

        <div class="flex gap-4 mb-4">
          <button onclick="selectSize(event,'S')" class="bg-zinc-800 px-4 py-2 rounded">S</button>
          <button onclick="selectSize(event,'M')" class="bg-zinc-800 px-4 py-2 rounded">M</button>
          <button onclick="selectSize(event,'L')" class="bg-zinc-800 px-4 py-2 rounded">L</button>
        </div>

        <button onclick="addToCart()" class="bg-white text-black px-6 py-3 rounded">
          Agregar
        </button>
      </div>

    </div>

    <!-- PREVIEW -->
    <div class="md:w-2/3 flex items-center justify-center">

      <div id="preview" class="relative w-80 h-80 flex items-center justify-center">

        <!-- 🔥 PRENDA DINÁMICA -->
        <div id="shirtBase" class="bg-white w-64 h-72 rounded"></div>

        <div id="designs" class="absolute inset-0"></div>

      </div>

    </div>

  </div>

  <script src="js/builder.js"></script>

</body>
</html>
