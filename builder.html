<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LÖVA Builder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<nav class="flex justify-between p-4 bg-zinc-900">
<h1>LÖVA Builder</h1>
<button onclick="goHome()">Volver</button>
</nav>

<div class="flex flex-col md:flex-row h-screen">

<!-- PANEL -->
<div class="md:w-1/3 p-6 bg-zinc-900 overflow-y-auto">

<div id="step1">
<h2 class="mb-4">Prenda</h2>
<div class="grid grid-cols-2 gap-3">
<button onclick="selectProduct('polera')" class="bg-zinc-800 p-3 rounded">Polera</button>
<button onclick="selectProduct('polo')" class="bg-zinc-800 p-3 rounded">Polo</button>
<button onclick="selectProduct('canguro')" class="bg-zinc-800 p-3 rounded">Canguro</button>
<button onclick="selectProduct('sudadera')" class="bg-zinc-800 p-3 rounded">Sudadera</button>
</div>
</div>

<div id="stepFit" class="hidden mt-6">
<h2 class="mb-4">Corte</h2>
<button onclick="selectFit('oversized')" class="bg-zinc-800 px-4 py-2 rounded">Oversized</button>
<button onclick="selectFit('basic')" class="bg-zinc-800 px-4 py-2 rounded">Básico</button>
</div>

<div id="stepColor" class="hidden mt-6">
<h2 class="mb-4">Color</h2>
<div id="colors" class="grid grid-cols-4 gap-2"></div>
</div>

<div id="stepUpload" class="hidden mt-6">
<input type="file" id="upload" multiple class="mb-3">
<button onclick="deleteSelected()" class="bg-red-500 px-3 py-2 rounded mb-3">Eliminar</button>
<button onclick="goSize()" class="bg-white text-black px-4 py-2 rounded">Siguiente</button>
</div>

<div id="stepSize" class="hidden mt-6">
<div class="flex gap-3 mb-3">
<button onclick="selectSize(event,'S')" class="bg-zinc-800 px-3 py-2 rounded">S</button>
<button onclick="selectSize(event,'M')" class="bg-zinc-800 px-3 py-2 rounded">M</button>
<button onclick="selectSize(event,'L')" class="bg-zinc-800 px-3 py-2 rounded">L</button>
</div>

<button onclick="addToCart()" class="bg-white text-black px-4 py-2 rounded">
Agregar
</button>
</div>

</div>

<!-- PREVIEW -->
<div class="md:w-2/3 flex flex-col items-center justify-center gap-4">

<!-- BOTÓN GIRAR -->
<div class="flex gap-4">
<button onclick="setView('front')" class="bg-zinc-800 px-4 py-2 rounded">Frente</button>
<button onclick="setView('back')" class="bg-zinc-800 px-4 py-2 rounded">Espalda</button>
</div>

<div id="preview" class="relative w-96 h-96 bg-zinc-800 rounded overflow-hidden">

<img id="mockup" class="absolute w-full h-full object-contain">

<div id="colorLayer" class="absolute inset-0 mix-blend-multiply"></div>

<div id="designs" class="absolute inset-0"></div>

</div>

</div>

</div>

<script src="js/builder.js"></script>
</body>
</html>
