<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>LÖVA | Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-black text-white flex items-center justify-center h-screen">

  <div class="bg-zinc-900 p-8 rounded-2xl w-80 shadow-xl">

    <h1 class="text-3xl font-bold text-center mb-6">LÖVA</h1>

    <input 
      id="email"
      type="text"
      placeholder="Usuario"
      class="w-full p-3 mb-4 rounded bg-zinc-800"
    >

    <input 
      id="password"
      type="password"
      placeholder="Contraseña"
      class="w-full p-3 mb-6 rounded bg-zinc-800"
    >

    <button 
      onclick="login()"
      class="w-full bg-white text-black py-3 rounded font-bold hover:bg-gray-300"
    >
      Iniciar sesión
    </button>

  </div>

  <script src="js/auth.js"></script>

</body>
</html>
