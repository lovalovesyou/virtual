<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>LÖVA | Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
    }
  </style>
</head>

<body class="bg-black text-white">

  <!-- NAV -->
  <nav class="flex justify-between items-center p-4 bg-zinc-900">
    <h1 class="text-2xl font-bold">LÖVA</h1>

    <div class="flex gap-4">
      <button onclick="goToCart()">🛒</button>
      <button onclick="logout()">Salir</button>
    </div>
  </nav>

  <!-- HERO -->
  <section class="h-[80vh] flex flex-col justify-center items-center text-center px-4">

    <h2 class="text-5xl font-bold mb-4">
      Diseña tu estilo
    </h2>

    <p class="mb-6 text-gray-300">
      Crea prendas únicas con LÖVA
    </p>

    <button 
      onclick="goToBuilder()"
      class="bg-white text-black px-8 py-4 rounded-xl font-bold text-lg hover:bg-gray-300"
    >
      PERSONALIZAR AHORA
    </button>

  </section>

  <!-- PRODUCTOS -->
  <section class="px-6 py-10">

    <h3 class="text-3xl mb-6 text-center">Nuestros estilos</h3>

    <div class="grid md:grid-cols-4 gap-6">

      <!-- ITEM -->
      <div class="bg-zinc-900 p-4 rounded-xl">
        <img src="https://via.placeholder.com/300" class="rounded mb-3">
        <p class="text-center">Polera</p>
      </div>

      <div class="bg-zinc-900 p-4 rounded-xl">
        <img src="https://via.placeholder.com/300" class="rounded mb-3">
        <p class="text-center">Sudadera</p>
      </div>

      <div class="bg-zinc-900 p-4 rounded-xl">
        <img src="https://via.placeholder.com/300" class="rounded mb-3">
        <p class="text-center">Canguro</p>
      </div>

      <div class="bg-zinc-900 p-4 rounded-xl">
        <img src="https://via.placeholder.com/300" class="rounded mb-3">
        <p class="text-center">Polo</p>
      </div>

    </div>

  </section>

  <!-- CTA FINAL -->
  <section class="text-center py-10">

    <h3 class="text-3xl mb-4">Empieza a crear ahora</h3>

    <button 
      onclick="goToBuilder()"
      class="bg-white text-black px-8 py-4 rounded-xl font-bold"
    >
      IR AL BUILDER
    </button>

  </section>

  <!-- BOTONES FLOTANTES -->
  <div class="fixed bottom-5 right-5 flex flex-col gap-3">

    <a 
      href="https://wa.me/59164030721"
      target="_blank"
      class="bg-green-500 px-4 py-3 rounded-full text-black font-bold"
    >
      WhatsApp
    </a>

    <a 
      href="https://instagram.com/lova_oficial.bo"
      target="_blank"
      class="bg-pink-500 px-4 py-3 rounded-full font-bold"
    >
      Instagram
    </a>

  </div>

  <script type="module" src="js/app.js"></script>

</body>
</html>
